spring:
  application:
    name: SecurityPlatform

  datasource:
    url: jdbc:postgresql://localhost:5432/security_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8001

logging:
  level:
    org.example.securityplatform: INFO
    org.hibernate.SQL: DEBUG

# 文件上传配置
file:
  upload:
    dir: ./uploads
  max-size: 500MB
